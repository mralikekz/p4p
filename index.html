<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="P4P - Fan-driven Pound-for-Pound MMA rankings. Vote for your favorite fighter using Pi Network.">
<title>P4P — Fan MMA Rankings</title>

<!-- Pi Network SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* =============================================
   CSS CUSTOM PROPERTIES — THEME SYSTEM
   ============================================= */
:root {
  --gold:       #F5C518;
  --gold-dim:   #C49A14;
  --gold-glow:  rgba(245,197,24,0.18);
  --pi:         #6922D4;
  --pi-mid:     #8B3FF5;
  --pi-light:   #B07EFF;
  --pi-glow:    rgba(139,63,245,0.18);
  --red:        #E8344A;
  --green:      #00C896;
  --radius-sm:  6px;
  --radius-md:  10px;
  --radius-lg:  16px;
  --speed:      0.22s;
}

/* DARK THEME */
[data-theme="dark"] {
  --bg-root:    #08080F;
  --bg-surface: #0F0F1A;
  --bg-card:    #141420;
  --bg-card2:   #1A1A28;
  --bg-input:   #1F1F30;
  --border:     rgba(255,255,255,0.07);
  --border-acc: rgba(245,197,24,0.2);
  --border-pi:  rgba(139,63,245,0.25);
  --text-h:     #FFFFFF;
  --text-body:  #C8C8D8;
  --text-muted: #60607A;
  --text-dim:   #404058;
  --shadow-card: 0 4px 28px rgba(0,0,0,0.55);
  --shadow-glow: 0 0 40px rgba(245,197,24,0.08);
  --nav-blur:   rgba(8,8,15,0.95);
  --overlay:    rgba(0,0,10,0.88);
  --photo-bg:   #1C1C2E;
  --photo-border: rgba(255,255,255,0.08);
  --champ-grad: linear-gradient(135deg, rgba(245,197,24,0.07) 0%, rgba(139,63,245,0.05) 100%);
  --row-hover:  rgba(139,63,245,0.07);
  --scan-line:  rgba(255,255,255,0.015);
}

/* LIGHT THEME */
[data-theme="light"] {
  --bg-root:    #F0EFF8;
  --bg-surface: #E8E7F2;
  --bg-card:    #FFFFFF;
  --bg-card2:   #F6F5FC;
  --bg-input:   #EEEDF8;
  --border:     rgba(0,0,0,0.08);
  --border-acc: rgba(180,130,0,0.25);
  --border-pi:  rgba(105,34,212,0.2);
  --text-h:     #0E0E1E;
  --text-body:  #3A3A55;
  --text-muted: #8888A8;
  --text-dim:   #BABACE;
  --shadow-card: 0 2px 20px rgba(105,34,212,0.1);
  --shadow-glow: 0 0 40px rgba(105,34,212,0.05);
  --nav-blur:   rgba(240,239,248,0.96);
  --overlay:    rgba(10,8,30,0.72);
  --photo-bg:   #E0DFF0;
  --photo-border: rgba(0,0,0,0.1);
  --champ-grad: linear-gradient(135deg, rgba(245,197,24,0.08) 0%, rgba(105,34,212,0.06) 100%);
  --row-hover:  rgba(105,34,212,0.05);
  --scan-line:  transparent;
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; font-size: 16px; }

body {
  background: var(--bg-root);
  color: var(--text-body);
  font-family: 'Barlow', sans-serif;
  font-weight: 500;
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--speed), color var(--speed);
}

/* Scanline texture on dark mode */
[data-theme="dark"] body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    var(--scan-line) 0px,
    var(--scan-line) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

/* Ambient glow bg */
.bg-ambient {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 0%, var(--pi-glow) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 100%, var(--gold-glow) 0%, transparent 60%);
  transition: opacity var(--speed);
}

/* =============================================
   TYPOGRAPHY
   ============================================= */
h1, h2, h3, .display {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  color: var(--text-h);
  letter-spacing: 0.02em;
  line-height: 1;
}

/* =============================================
   HEADER
   ============================================= */
.app-header {
  position: relative;
  z-index: 10;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
  transition: background var(--speed);
}

.header-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 0 16px;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
}

.logo-block {}
.logo-pi-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(139,63,245,0.12);
  border: 1px solid var(--border-pi);
  border-radius: 100px;
  padding: 3px 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--pi-light);
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.pi-pulse {
  width: 6px; height: 6px;
  background: var(--pi-light);
  border-radius: 50%;
  animation: pulse-dot 2.2s infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.3; transform:scale(0.6); }
}

.logo-title {
  font-size: clamp(56px, 14vw, 100px);
  background: linear-gradient(135deg, var(--gold) 0%, #FFF8E0 50%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.06em;
  line-height: 0.9;
}
[data-theme="light"] .logo-title {
  background: linear-gradient(135deg, #8A5C00 0%, #3B1F80 50%, #8A5C00 100%);
  -webkit-background-clip: text;
  background-clip: text;
}
.logo-sub {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(11px, 2.5vw, 15px);
  letter-spacing: 5px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 4px;
}

/* Header controls */
.header-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-top: 4px;
  flex-shrink: 0;
}

.lang-select {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-body);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  cursor: pointer;
  outline: none;
  transition: border-color var(--speed), background var(--speed);
  max-width: 110px;
}
.lang-select:focus { border-color: var(--border-pi); }

.theme-btn {
  width: 44px; height: 24px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  transition: background var(--speed);
  flex-shrink: 0;
}
.theme-btn::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--pi-light);
  transition: transform var(--speed), background var(--speed);
  display: flex; align-items: center; justify-content: center;
}
[data-theme="light"] .theme-btn::after {
  transform: translateX(20px);
  background: var(--gold-dim);
}
.theme-icon { font-size: 14px; }

/* Header stats */
.header-stats {
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
}
.hstat { text-align: center; }
.hstat-n {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 26px;
  color: var(--gold);
  letter-spacing: 1px;
}
.hstat-l {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
}

/* =============================================
   NAVIGATION
   ============================================= */
.app-nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--nav-blur);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.app-nav::-webkit-scrollbar { display: none; }

.nav-inner {
  display: inline-flex;
  min-width: 100%;
  padding: 0 12px;
}

.nav-tab {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 13px 16px;
  border: none;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: color var(--speed), border-color var(--speed);
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-tab:hover:not(.active) { color: var(--text-body); }
.nav-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

/* =============================================
   PAGES
   ============================================= */
.page { display: none; }
.page.active { display: block; }

.page-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 20px 14px 80px;
  position: relative;
  z-index: 5;
}

/* Section label */
.sec-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 18px 0 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.sec-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* =============================================
   P4P LEADERBOARD CARDS
   ============================================= */
.p4p-list {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.p4p-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-card);
  transition: transform var(--speed), border-color var(--speed), box-shadow var(--speed);
  position: relative;
  overflow: hidden;
  cursor: default;
}
.p4p-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: transparent;
  transition: background var(--speed);
}
.p4p-card:hover {
  transform: translateX(4px);
  border-color: var(--border-acc);
  box-shadow: var(--shadow-card), var(--shadow-glow);
}
.p4p-card:hover::before { background: var(--gold); }

/* Top 3 styling */
.p4p-card[data-rank="1"] { border-color: rgba(245,197,24,0.3); background: linear-gradient(90deg, rgba(245,197,24,0.04), var(--bg-card)); }
.p4p-card[data-rank="1"]::before { background: var(--gold); }
.p4p-card[data-rank="2"] { border-color: rgba(192,192,192,0.2); }
.p4p-card[data-rank="3"] { border-color: rgba(205,127,50,0.18); }

/* Photo */
.fighter-photo {
  width: 54px; height: 54px;
  border-radius: 50%;
  overflow: hidden;
  background: var(--photo-bg);
  border: 2px solid var(--photo-border);
  flex-shrink: 0;
  position: relative;
}
.fighter-photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}
.fighter-photo .ph {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  background: var(--photo-bg);
  color: rgba(255,255,255,0.9);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  letter-spacing: 1px;
  border-radius: 50%;
}
.fighter-photo.sz-lg { width: 68px; height: 68px; }
.fighter-photo.sz-sm { width: 44px; height: 44px; }
.fighter-photo.sz-sm .ph { font-size: 18px; }

/* Rank number */
.rank-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 28px;
  min-width: 34px;
  text-align: center;
  color: var(--text-dim);
  flex-shrink: 0;
  line-height: 1;
}
.rank-num.gold  { color: var(--gold); }
.rank-num.silver{ color: #C0C0C0; }
.rank-num.bronze{ color: #CD7F32; }

/* Fighter info */
.fighter-info { flex: 1; min-width: 0; }
.fighter-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 17px;
  color: var(--text-h);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}
.fighter-meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
  line-height: 1.3;
}
.flag { font-size: 16px; margin-right: 4px; }

/* Score bar */
.score-wrap { width: 100px; flex-shrink: 0; }
.score-pts {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--gold);
  text-align: right;
  margin-bottom: 4px;
}
.score-bar-bg {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pi-mid), var(--gold));
  border-radius: 2px;
  transition: width 0.9s cubic-bezier(0.4,0,0.2,1);
  min-width: 4px;
}

/* Vote button */
.btn-vote {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1.5px;
  padding: 8px 16px;
  background: linear-gradient(135deg, var(--pi) 0%, #4A15A0 100%);
  border: none;
  border-radius: var(--radius-sm);
  color: #fff;
  cursor: pointer;
  flex-shrink: 0;
  white-space: nowrap;
  transition: transform 0.13s, box-shadow 0.13s, background 0.18s;
  box-shadow: 0 2px 12px rgba(105,34,212,0.35);
}
.btn-vote:hover {
  background: linear-gradient(135deg, var(--pi-mid), var(--pi));
  transform: scale(1.05) translateY(-1px);
  box-shadow: 0 5px 20px rgba(139,63,245,0.5);
}
.btn-vote:active { transform: scale(0.97); }

/* =============================================
   WEIGHT CLASS PAGE
   ============================================= */
.weight-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.weight-icon {
  font-size: 34px;
  line-height: 1;
  flex-shrink: 0;
}
.weight-title {
  font-size: clamp(22px, 6vw, 34px);
  color: var(--gold);
  line-height: 1;
}
.weight-limit {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 3px;
  font-family: 'Share Tech Mono', monospace;
}

/* Champion card */
.champ-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--champ-grad);
  border: 1px solid var(--border-acc);
  border-radius: var(--radius-lg);
  margin-bottom: 14px;
  box-shadow: var(--shadow-card);
}
.champ-label-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 3px;
}
.champ-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: clamp(18px, 5vw, 26px);
  color: var(--text-h);
  line-height: 1;
}
.champ-record {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 3px;
}

/* Fighter rows */
.fighter-list { display: flex; flex-direction: column; gap: 5px; }
.fighter-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 13px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  transition: transform var(--speed), border-color var(--speed), background var(--speed);
  position: relative;
  overflow: hidden;
}
.fighter-row::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: transparent;
  transition: background var(--speed);
}
.fighter-row:hover {
  transform: translateX(3px);
  border-color: var(--border-pi);
  background: var(--row-hover);
}
.fighter-row:hover::before { background: var(--pi-mid); }

.fr-rank {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 20px;
  min-width: 26px;
  text-align: center;
  color: var(--text-dim);
  flex-shrink: 0;
}
.fr-info { flex: 1; min-width: 0; }
.fr-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 16px;
  color: var(--text-h);
  line-height: 1.2;
}
.fr-record {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 1px;
}
.fr-pts {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--pi-light);
  min-width: 64px;
  text-align: right;
  flex-shrink: 0;
}
.btn-vote-sm {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1px;
  padding: 6px 12px;
  background: rgba(139,63,245,0.12);
  border: 1px solid var(--border-pi);
  border-radius: var(--radius-sm);
  color: var(--pi-light);
  cursor: pointer;
  flex-shrink: 0;
  transition: background var(--speed), color var(--speed), box-shadow var(--speed);
  white-space: nowrap;
}
.btn-vote-sm:hover {
  background: rgba(139,63,245,0.28);
  color: #fff;
  box-shadow: 0 3px 14px rgba(139,63,245,0.4);
}

/* Tag for interim/note */
.tag-note {
  display: inline-block;
  font-size: 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
  color: var(--gold);
  background: rgba(245,197,24,0.1);
  border: 1px solid rgba(245,197,24,0.25);
  border-radius: 3px;
  padding: 1px 5px;
  margin-left: 5px;
  vertical-align: middle;
}

/* =============================================
   MODAL
   ============================================= */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--overlay);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--speed);
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal-box {
  background: var(--bg-card2);
  border: 1px solid var(--border-acc);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  max-width: 400px;
  width: 100%;
  position: relative;
  transform: translateY(28px) scale(0.96);
  transition: transform 0.26s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(245,197,24,0.1);
}
.modal-overlay.open .modal-box { transform: translateY(0) scale(1); }

.modal-close {
  position: absolute;
  top: 14px; right: 16px;
  background: none; border: none;
  color: var(--text-muted); font-size: 22px;
  cursor: pointer; line-height: 1;
  transition: color var(--speed);
}
.modal-close:hover { color: var(--text-h); }

/* Modal fighter hero */
.modal-fighter-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 20px;
  text-align: center;
}
.modal-photo {
  width: 88px; height: 88px;
  border-radius: 50%;
  overflow: hidden;
  background: var(--photo-bg);
  border: 3px solid rgba(245,197,24,0.3);
  margin-bottom: 12px;
  box-shadow: 0 0 24px rgba(245,197,24,0.12);
}
.modal-photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
}
.modal-photo .ph {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  color: rgba(255,255,255,0.9);
  border-radius: 50%;
  letter-spacing: 1px;
}
.modal-label {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--pi-light);
  margin-bottom: 4px;
}
.modal-name {
  font-size: clamp(20px, 5vw, 27px);
  color: var(--text-h);
  line-height: 1;
}
.modal-division {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Pi cost box */
.pi-cost-box {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(139,63,245,0.09);
  border: 1px solid var(--border-pi);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  margin-bottom: 14px;
}
.pi-cost-left .pi-amount {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 42px;
  color: var(--pi-light);
  line-height: 1;
}
.pi-cost-left .pi-label {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--text-muted);
  text-transform: uppercase;
  margin-top: 2px;
}
.pi-cost-right { text-align: right; }
.pi-cost-right .pi-pts {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 26px;
  color: var(--gold);
  line-height: 1;
}
